<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="G-Scores — Tra cứu điểm thi THPT Quốc gia 2024, thống kê phổ điểm, top 10 khối A" />
  <title>{% block title %}G-Scores{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <div class="layout">
    <!-- Header -->
    <header class="header">
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">☰</button>
      <span>G-Scores</span>
    </header>

    <div class="body-wrap">
      <!-- Sidebar -->
      <nav class="sidebar" id="sidebar">
        <div class="menu-title">Menu</div>
        <a href="/" class="{% if active == 'home' %}active{% endif %}">
          <span class="icon">🏠</span> Dashboard
        </a>
        <a href="/" class="{% if active == 'search' %}active{% endif %}">
          <span class="icon">🔍</span> Tra cứu điểm
        </a>
        <a href="/report" class="{% if active == 'report' %}active{% endif %}">
          <span class="icon">📊</span> Báo cáo
        </a>
        <a href="/top10-group-a" class="{% if active == 'top10' %}active{% endif %}">
          <span class="icon">🏆</span> Top 10 Khối A
        </a>
      </nav>

      <!-- Overlay for mobile sidebar -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- Main Content -->
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script>
    // Mobile sidebar toggle
    const hamburger = document.getElementById('hamburger-btn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    function toggleSidebar() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    }

    hamburger.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', toggleSidebar);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
