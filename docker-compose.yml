services:
  web:
    build: .
    container_name: gscores
    ports:
      - "5000:5000"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      GSCORES_AUTO_MIGRATE: "true"
      GSCORES_AUTO_SEED: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
